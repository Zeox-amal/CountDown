<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Your Birthday Surprise | April 26 ❤️</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;700;800&family=Dancing+Script:wght@700&family=Playfair+Display:ital,wght@0,700;1,700&display=swap');
        
        :root {
            --bg-deep: #0f172a;
            --bg-glow: #1e1b4b;
            --accent-pink: #f472b6;
            --accent-purple: #a78bfa;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: var(--bg-deep);
            color: white;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            margin: 0;
            position: relative;
            touch-action: manipulation;
        }

        .bg-animate {
            position: fixed;
            inset: 0;
            background: radial-gradient(circle at center, var(--bg-glow) 0%, var(--bg-deep) 100%);
            z-index: -2;
        }

        /* Anime Character Styles */
        .character-container {
            position: relative;
            width: 100%;
            max-width: 300px;
            height: 140px;
            margin: 0 auto;
            display: flex;
            align-items: flex-end;
            justify-content: space-between;
            padding-bottom: 20px;
        }

        .character {
            font-size: 55px;
            position: absolute;
            bottom: 0;
            transition: all 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
            filter: drop-shadow(0 5px 15px rgba(0,0,0,0.3));
            user-select: none;
        }

        #boy { left: 0%; transform: scaleX(1); }
        #girl { right: 0%; transform: scaleX(-1); }

        .meeting-heart {
            position: absolute;
            left: 50%;
            top: 15%;
            transform: translate(-50%, -50%) scale(0);
            font-size: 45px;
            transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 10;
        }

        /* Bubble Styles */
        .bubble {
            position: absolute;
            background: rgba(255, 255, 255, 0.12);
            backdrop-filter: blur(4px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: inset 0 0 15px rgba(255, 255, 255, 0.2);
            animation: float-up var(--dur) linear infinite;
            z-index: 40;
            user-select: none;
        }

        @keyframes float-up {
            from { transform: translateY(110vh) translateX(var(--drift)); }
            to { transform: translateY(-25vh) translateX(var(--drift-end)); }
        }

        .glass {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.15);
        }

        .gradient-text {
            background: linear-gradient(135deg, var(--accent-purple), var(--accent-pink));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        @keyframes pop {
            0% { transform: scale(1); opacity: 1; }
            100% { transform: scale(2.5); opacity: 0; }
        }
        .pop-effect {
            position: absolute;
            pointer-events: none;
            border-radius: 50%;
            border: 2px solid var(--accent-pink);
            animation: pop 0.4s ease-out forwards;
            z-index: 50;
        }

        #gift-modal { display: none; }

        .path-line {
            position: absolute;
            bottom: 12px;
            left: 20px;
            right: 20px;
            height: 3px;
            background: rgba(255,255,255,0.08);
            border-radius: 10px;
        }
        
        .instruction-tag {
            background: rgba(244, 114, 182, 0.15);
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 10px;
            font-weight: 800;
            letter-spacing: 0.1em;
            color: var(--accent-pink);
            display: inline-block;
        }
    </style>
</head>
<body>

    <div class="bg-animate"></div>
    <div id="bubbles-container"></div>

    <div id="main-container" class="text-center px-6 w-full max-w-md relative z-10">
        <div id="start-screen">
            <div class="mb-4">
                <span id="current-date-ui" class="instruction-tag">APRIL 1ST</span>
            </div>
            
            <h1 class="text-2xl font-black mb-8 leading-tight">
                Pop <span id="target-count" class="gradient-text">25</span> bubbles to bring <br>
                <span class="gradient-text italic">Us Together</span>
            </h1>

            <!-- Anime Characters Game UI -->
            <div class="character-container mb-10">
                <div class="path-line"></div>
                <div id="meeting-heart" class="meeting-heart">💖</div>
                <div id="boy" class="character">👦</div>
                <div id="girl" class="character">👧</div>
            </div>

            <div class="mb-6">
                <p class="text-[11px] uppercase tracking-[0.2em] text-gray-400 font-bold">
                    <span id="score-text" class="text-pink-400 text-lg">0</span> / <span id="goal-text">25</span> Popped
                </p>
            </div>
            
            <p id="sub-text" class="text-xs italic text-pink-300 opacity-60">Every pop closes the distance...</p>
        </div>

        <!-- Birthday Reveal (April 26 Only) -->
        <div id="birthday-reveal" class="hidden w-full">
            <div class="text-7xl mb-6 animate-bounce">🎂</div>
            <h1 class="text-4xl font-black gradient-text mb-6">HAPPY BIRTHDAY!</h1>
            <div class="glass p-8 rounded-[2.5rem] border border-white/20 shadow-2xl">
                <p class="text-xl font-serif italic text-white mb-6">"To my favorite person, may today be as incredible as you are."</p>
                <p class="text-purple-300 font-bold tracking-widest uppercase text-xs">I Love You Forever</p>
            </div>
        </div>
    </div>

    <!-- The Countdown Card -->
    <div id="gift-modal" class="fixed inset-0 z-[100] flex items-center justify-center p-4 bg-black/80 backdrop-blur-xl">
        <div class="glass w-full max-w-[340px] p-10 rounded-[3rem] text-center border border-white/20 relative shadow-2xl">
            <div class="text-6xl mb-4">💑</div>
            <h3 id="modal-date" class="text-purple-400 font-bold uppercase tracking-widest text-[10px] mb-2">April 1st</h3>
            
            <div class="mb-6">
                <span id="days-remaining" class="text-7xl font-black gradient-text">25</span>
                <p class="text-xs text-gray-400 uppercase tracking-[0.2em] mt-2">Days Until April 26th</p>
            </div>

            <div class="mb-8 border-t border-white/10 pt-6">
                <p id="quote-body" class="text-xl font-semibold leading-relaxed text-white italic" style="font-family: 'Dancing Script', cursive;"></p>
            </div>

            <button onclick="location.reload()" class="w-full py-4 bg-gradient-to-r from-purple-500 to-pink-500 rounded-2xl font-bold text-sm text-white shadow-lg shadow-pink-500/20 active:scale-95 transition-transform">
                I'll be back tomorrow! ❤️
            </button>
        </div>
    </div>

    <script>
        const BIRTHDAY_DAY = 26;
        const QUOTES = [
            "Every day is a countdown to loving you more.",
            "You're the best gift I've ever received.",
            "I can't wait to celebrate you, my love.",
            "The world became brighter when you were born.",
            "Counting down to your special day!",
            "You deserve all the happiness in the world.",
            "My heart beats faster as your birthday gets closer.",
            "You are my favorite reason to celebrate.",
            "Distance means nothing when someone means everything.",
            "I'm so lucky to have you by my side."
        ];

        let score = 0;
        let goal = 25; // Default for April 1st
        let gameActive = true;

        function init() {
            const today = new Date();
            const day = today.getDate();
            const monthNames = ["January", "February", "March", "April", "May", "June"];
            
            // Set goal based on days remaining (26 - current day)
            goal = Math.max(1, BIRTHDAY_DAY - day);
            
            document.getElementById('current-date-ui').innerText = `${monthNames[today.getMonth()]} ${day}${getOrdinal(day)}`.toUpperCase();
            document.getElementById('target-count').innerText = goal;
            document.getElementById('goal-text').innerText = goal;
            document.getElementById('modal-date').innerText = `${monthNames[today.getMonth()]} ${day}${getOrdinal(day)}`;

            // Countdown Logic for Modal
            document.getElementById('days-remaining').innerText = goal;

            // Random Quote
            document.getElementById('quote-body').innerText = QUOTES[Math.floor(Math.random() * QUOTES.length)];

            // Start Game Loop
            setInterval(createBubble, 750);
        }

        function createBubble() {
            if (!gameActive) return;

            const bubble = document.createElement('div');
            bubble.className = 'bubble';
            
            const size = Math.random() * 25 + 50; // slightly larger for easier tapping
            bubble.style.width = size + 'px';
            bubble.style.height = size + 'px';
            bubble.style.left = Math.random() * 85 + 'vw';
            
            const emojis = ['❤️', '✨', '🎈', '💖', '🎁', '🌸', '🍭', '🦋'];
            bubble.innerHTML = `<span style="font-size: ${size/2}px">${emojis[Math.floor(Math.random() * emojis.length)]}</span>`;
            
            bubble.style.setProperty('--dur', (Math.random() * 2 + 3.5) + 's');
            bubble.style.setProperty('--drift', (Math.random() * 60 - 30) + 'px');
            bubble.style.setProperty('--drift-end', (Math.random() * 120 - 60) + 'px');

            // Support for both mouse and touch
            bubble.onmousedown = (e) => popBubble(e, bubble);
            bubble.ontouchstart = (e) => {
                e.preventDefault();
                popBubble(e.touches[0], bubble);
            };
            
            document.getElementById('bubbles-container').appendChild(bubble);
            setTimeout(() => bubble.remove(), 6000);
        }

        function popBubble(e, element) {
            if (!gameActive) return;

            // Visual Pop Effect
            const pop = document.createElement('div');
            pop.className = 'pop-effect';
            pop.style.left = (e.clientX || e.pageX) + 'px';
            pop.style.top = (e.clientY || e.pageY) + 'px';
            pop.style.width = element.style.width;
            pop.style.height = element.style.height;
            pop.style.transform = 'translate(-50%, -50%)';
            document.body.appendChild(pop);
            setTimeout(() => pop.remove(), 400);

            element.remove();
            score++;
            
            updateCharacters();

            if (score >= goal) {
                gameActive = false;
                finishGame();
            }
        }

        function updateCharacters() {
            const boy = document.getElementById('boy');
            const girl = document.getElementById('girl');
            const scoreText = document.getElementById('score-text');
            
            // Move characters closer based on dynamic goal
            // They meet at roughly 41% from each side
            const progress = (score / goal) * 41;
            boy.style.left = progress + '%';
            girl.style.right = progress + '%';
            
            scoreText.innerText = score;
        }

        function finishGame() {
            const boy = document.getElementById('boy');
            const girl = document.getElementById('girl');
            const heart = document.getElementById('meeting-heart');
            
            // Final snap together
            boy.style.left = '41%';
            girl.style.right = '41%';
            
            setTimeout(() => {
                heart.style.transform = 'translate(-50%, -50%) scale(1.6)';
                fireConfetti();
            }, 350);

            const today = new Date();
            // If it is April 26th
            if (today.getDate() === BIRTHDAY_DAY && today.getMonth() === 3) {
                setTimeout(() => {
                    document.getElementById('start-screen').classList.add('hidden');
                    document.getElementById('birthday-reveal').classList.remove('hidden');
                }, 1300);
            } else {
                setTimeout(() => {
                    document.getElementById('gift-modal').style.display = 'flex';
                }, 1300);
            }
        }

        function fireConfetti() {
            const count = 200;
            const defaults = { origin: { y: 0.7 }, zIndex: 1001 };

            function fire(particleRatio, opts) {
                confetti({ ...defaults, ...opts, particleCount: Math.floor(count * particleRatio) });
            }

            fire(0.25, { spread: 26, startVelocity: 55 });
            fire(0.2, { spread: 60 });
            fire(0.35, { spread: 100, decay: 0.91, scalar: 0.8 });
            fire(0.1, { spread: 120, startVelocity: 25, decay: 0.92, scalar: 1.2 });
        }

        function getOrdinal(n) {
            let s = ["th", "st", "nd", "rd"], v = n % 100;
            return s[(v - 20) % 10] || s[v] || s[0];
        }

        window.onload = init;
    </script>
</body>
</html>
