<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Your Birthday Surprise | April 26 ❤️</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;700;800&family=Dancing+Script:wght@700&family=Playfair+Display:ital,wght@0,700;1,700&display=swap');
        
        :root {
            --bg-deep: #0f172a;
            --bg-glow: #1e1b4b;
            --accent-pink: #f472b6;
            --accent-purple: #a78bfa;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: var(--bg-deep);
            color: white;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            margin: 0;
            position: relative;
            touch-action: manipulation;
        }

        /* Animated Background Layer */
        .bg-animate {
            position: fixed;
            inset: 0;
            background: radial-gradient(circle at center, var(--bg-glow) 0%, var(--bg-deep) 100%);
            z-index: -2;
        }

        /* Heart Shimmer Effect */
        .bg-heart-shimmer {
            position: fixed;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: -1;
            pointer-events: none;
            opacity: 0.15;
        }

        .heart-shape {
            width: 80vmax;
            height: 80vmax;
            background: radial-gradient(circle, var(--accent-pink) 0%, transparent 70%);
            clip-path: path('M12 21.593c-5.63-5.54-12-10.997-12-16.593 0-3.866 3.134-7 7-7 2.108 0 4.002 0.923 5 2.382 0.998-1.459 2.892-2.382 5-2.382 3.866 0 7 3.134 7 7 0 5.596-6.37 11.053-12 16.593z');
            transform-origin: center;
            animation: heartPulse 8s infinite ease-in-out;
        }

        @keyframes heartPulse {
            0%, 100% { transform: scale(1); opacity: 0.4; }
            50% { transform: scale(1.2); opacity: 0.8; filter: blur(20px); }
        }

        /* Butterfly Styles */
        .butterfly {
            position: absolute;
            pointer-events: none;
            z-index: 0;
            opacity: 0.6;
            animation: fly var(--dur) infinite ease-in-out;
        }

        @keyframes fly {
            0% { transform: translate(0, 0) rotate(0deg); }
            25% { transform: translate(50px, -25px) rotate(15deg); }
            50% { transform: translate(100px, 0px) rotate(-10deg); }
            75% { transform: translate(50px, 25px) rotate(5deg); }
            100% { transform: translate(0, 0) rotate(0deg); }
        }

        /* Drifting Gifts */
        .drifting-gift {
            position: absolute;
            font-size: 20px;
            opacity: 0.2;
            pointer-events: none;
            animation: drift var(--dur) infinite linear;
        }

        @keyframes drift {
            0% { transform: translateY(110vh) rotate(0deg); }
            100% { transform: translateY(-10vh) rotate(3600deg); }
        }

        .glass {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .gift-container {
            position: relative;
            cursor: pointer;
            transition: transform 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
            user-select: none;
            z-index: 50;
            display: inline-block;
            will-change: transform;
        }

        .gift-box {
            font-size: clamp(70px, 18vw, 110px);
            filter: drop-shadow(0 0 25px rgba(167, 139, 250, 0.4));
            transition: transform 0.1s ease;
        }

        .gift-container:active .gift-box {
            transform: scale(0.8);
        }

        @keyframes appear-wish {
            0% { transform: scale(0) rotate(-10deg); opacity: 0; }
            15% { transform: scale(1.1) rotate(var(--rot)); opacity: 1; }
            85% { transform: scale(1) rotate(var(--rot)); opacity: 1; }
            100% { transform: scale(0.8) rotate(var(--rot)); opacity: 0; }
        }

        .floating-wish {
            position: absolute;
            pointer-events: none;
            font-family: 'Dancing Script', cursive;
            font-size: 1.1rem;
            white-space: nowrap;
            color: var(--accent-pink);
            text-shadow: 0 0 12px rgba(244, 114, 182, 0.7);
            z-index: 5;
            animation: appear-wish 4s ease-out forwards;
        }

        .gradient-text {
            background: linear-gradient(135deg, var(--accent-purple), var(--accent-pink));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        #gift-modal {
            display: none;
        }

        @keyframes shake {
            0%, 100% { transform: rotate(0deg); }
            25% { transform: rotate(-5deg); }
            75% { transform: rotate(5deg); }
        }
        .shake-box {
            animation: shake 0.2s ease-in-out infinite;
        }

        #wishes-layer {
            position: fixed;
            inset: 0;
            pointer-events: none;
            overflow: hidden;
            z-index: 1;
        }

        .birthday-card {
            animation: slideUp 1s cubic-bezier(0.23, 1, 0.32, 1);
        }

        @keyframes slideUp {
            0% { transform: translateY(30px); opacity: 0; }
            100% { transform: translateY(0); opacity: 1; }
        }
    </style>
</head>
<body>

    <div class="bg-animate"></div>
    <div class="bg-heart-shimmer">
        <div class="heart-shape"></div>
    </div>
    <div id="background-elements"></div>
    <div id="wishes-layer"></div>

    <div id="main-container" class="text-center px-6 w-full max-w-md relative z-10">
        <div id="date-header" class="mb-4">
            <h2 id="today-date" class="text-sm font-bold text-purple-300 opacity-70 uppercase tracking-[0.2em]">Loading...</h2>
        </div>

        <div id="main-interaction">
            <h1 id="tap-instruction" class="text-2xl md:text-3xl font-black mb-8 leading-tight transition-opacity duration-500">
                Tap to open <br><span class="gradient-text italic">Your Surprise</span>
            </h1>

            <div id="gift-wrapper" class="relative py-12 flex justify-center items-center min-h-[300px]">
                <div id="movable-gift" class="gift-container" onclick="handleTap(event)">
                    <div id="gift-visual" class="gift-box">🎁</div>
                </div>
            </div>

            <p id="sub-instruction" class="text-sm text-gray-400 animate-pulse transition-opacity duration-500">Every tap fills the screen with love... ✨</p>
        </div>

        <div id="birthday-reveal" class="hidden birthday-card w-full">
            <div class="text-6xl mb-4 animate-bounce">🎂</div>
            <h1 class="text-4xl font-black gradient-text mb-4 leading-tight">HAPPY BIRTHDAY!</h1>
            
            <div class="glass p-6 rounded-[2rem] border border-white/20 shadow-2xl relative overflow-hidden">
                <div class="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-purple-500 to-pink-500"></div>
                <p class="text-xl font-serif italic text-white leading-relaxed mb-6" style="font-family: 'Playfair Display', serif;">
                    "To the one who makes every day feel like a celebration, I hope today is as beautiful as your heart."
                </p>
                <div class="flex justify-center gap-3 mb-4">
                    <span class="text-2xl">💖</span>
                    <span class="text-2xl">✨</span>
                    <span class="text-2xl">👑</span>
                </div>
                <p class="text-purple-300 font-bold tracking-widest uppercase text-[10px]">Forever Yours</p>
            </div>
            
            <button onclick="fireConfetti()" class="mt-8 px-6 py-3 bg-white/10 hover:bg-white/20 border border-white/20 rounded-full transition-all text-[10px] font-bold tracking-widest uppercase">
                Celebrate More ✨
            </button>
        </div>
    </div>

    <div id="gift-modal" class="fixed inset-0 z-[100] flex items-center justify-center p-4 bg-black/90 backdrop-blur-md">
        <div class="glass w-full max-w-[320px] p-8 rounded-[2.5rem] text-center border border-white/20 relative shadow-2xl">
            <div class="text-6xl mb-4">💝</div>
            <h3 id="modal-date" class="text-purple-400 font-bold uppercase tracking-widest text-[10px] mb-2">Today</h3>
            <p id="modal-body" class="text-lg font-semibold leading-relaxed text-white mb-8 italic" style="font-family: 'Dancing Script', cursive;"></p>
            <button onclick="closeModal()" class="w-full py-3 bg-gradient-to-r from-purple-500 to-pink-500 rounded-xl font-bold text-sm hover:scale-105 active:scale-95 transition-transform">
                I Love You! ❤️
            </button>
        </div>
    </div>

    <script>
        const BIRTH_MONTH = 3; 
        const BIRTH_DAY = 26;
        const START_DATE = new Date(2026, 3, 1);
        const totalDuration = 26;

        const MINI_WISHES = [
            "Beautiful! ✨", "My Queen 👑", "Love you! ❤️", "Special! 🌟", 
            "Thinking of you... 💭", "Favorite person 😊", "Stay amazing! 🔥", 
            "Pure magic! 🪄", "Keep smiling! 😄", "The best! 🏆", 
            "My heart! 💖", "So lucky 🍀", "My everything 🌎",
            "Stunning 💖", "My home 🏠", "Soulmates ∞",
            "Happy! 😍", "My angel 👼", "Forever yours ♾️", "A dream ✨"
        ];

        let clicksDone = 0;
        let requiredClicks = 0;
        let isOpened = false;

        function init() {
            const today = new Date();
            const day = today.getDate();
            const month = today.getMonth();
            const monthNames = ["January", "February", "March", "April", "May", "June"];
            
            document.getElementById('today-date').innerText = `${monthNames[month]} ${day}${getOrdinal(day)}`;

            const diffFromStart = Math.floor((today - START_DATE) / (1000 * 60 * 60 * 24));
            requiredClicks = Math.max(1, totalDuration - diffFromStart);

            createBackgroundDecor();

            if (month === BIRTH_MONTH && day === BIRTH_DAY) {
                // Keep game mode for birthday too until won
            }
        }

        function createBackgroundDecor() {
            const container = document.getElementById('background-elements');
            const butterflyCount = window.innerWidth < 600 ? 4 : 6;
            
            for(let i=0; i<butterflyCount; i++) {
                const b = document.createElement('div');
                b.className = 'butterfly';
                b.innerHTML = '🦋';
                b.style.left = Math.random() * 80 + 'vw';
                b.style.top = Math.random() * 80 + 'vh';
                b.style.fontSize = (Math.random() * 10 + 15) + 'px';
                b.style.setProperty('--dur', (Math.random() * 10 + 10) + 's');
                container.appendChild(b);
            }
            
            const giftCount = window.innerWidth < 600 ? 5 : 8;
            for(let i=0; i<giftCount; i++) {
                const g = document.createElement('div');
                g.className = 'drifting-gift';
                g.innerHTML = ['🎁', '💝', '✨', '🎈'][Math.floor(Math.random() * 4)];
                g.style.left = Math.random() * 90 + 'vw';
                g.style.setProperty('--dur', (Math.random() * 15 + 15) + 's');
                g.style.animationDelay = (Math.random() * 10) + 's';
                container.appendChild(g);
            }
        }

        function showBirthdayReveal() {
            document.getElementById('main-interaction').classList.add('hidden');
            document.getElementById('date-header').classList.add('hidden');
            document.getElementById('birthday-reveal').classList.remove('hidden');
            
            const duration = 15 * 1000;
            const animationEnd = Date.now() + duration;
            const defaults = { startVelocity: 30, spread: 360, ticks: 60, zIndex: 0 };
            const randomInRange = (min, max) => Math.random() * (max - min) + min;

            const interval = setInterval(function() {
                const timeLeft = animationEnd - Date.now();
                if (timeLeft <= 0) return clearInterval(interval);
                const particleCount = 40 * (timeLeft / duration);
                confetti({ ...defaults, particleCount, origin: { x: randomInRange(0.1, 0.3), y: Math.random() - 0.2 } });
                confetti({ ...defaults, particleCount, origin: { x: randomInRange(0.7, 0.9), y: Math.random() - 0.2 } });
            }, 250);
        }

        function handleTap(event) {
            if (isOpened) return;
            
            clicksDone++;
            spawnRandomWish();
            moveGiftRandomly();

            const visual = document.getElementById('gift-visual');
            visual.classList.add('shake-box');
            setTimeout(() => visual.classList.remove('shake-box'), 200);

            if (clicksDone === 1) {
                document.getElementById('tap-instruction').style.opacity = '0.3';
                document.getElementById('sub-instruction').style.opacity = '0.3';
            }

            if (clicksDone >= requiredClicks) {
                isOpened = true;
                resetGiftPosition();
                
                const today = new Date();
                if (today.getMonth() === BIRTH_MONTH && today.getDate() === BIRTH_DAY) {
                    setTimeout(showBirthdayReveal, 600);
                } else {
                    setTimeout(openGift, 600);
                }
            }
        }

        function moveGiftRandomly() {
            const gift = document.getElementById('movable-gift');
            
            // Constrain movement to 70% of screen to keep box fully visible
            const padding = 80;
            const maxX = (window.innerWidth - padding * 2) / 2;
            const maxY = (window.innerHeight - padding * 2) / 2;
            
            const randomX = (Math.random() - 0.5) * (maxX * 2);
            const randomY = (Math.random() - 0.5) * (maxY * 2);
            
            gift.style.transform = `translate(${randomX}px, ${randomY}px)`;
        }

        function resetGiftPosition() {
            const gift = document.getElementById('movable-gift');
            gift.style.transform = `translate(0, 0)`;
            document.getElementById('tap-instruction').style.opacity = '1';
            document.getElementById('sub-instruction').style.opacity = '1';
        }

        function spawnRandomWish() {
            const layer = document.getElementById('wishes-layer');
            const wish = document.createElement('div');
            wish.className = 'floating-wish';
            wish.innerText = MINI_WISHES[Math.floor(Math.random() * MINI_WISHES.length)];
            
            // Keep wishes away from center where gift is jumping
            wish.style.left = (Math.random() * 70 + 15) + '%';
            wish.style.top = (Math.random() * 70 + 15) + '%';
            
            const rotation = (Math.random() - 0.5) * 40;
            wish.style.setProperty('--rot', rotation + 'deg');
            layer.appendChild(wish);
            setTimeout(() => wish.remove(), 4000);
        }

        function openGift() {
            const today = new Date();
            const day = today.getDate();
            const monthNames = ["January", "February", "March", "April", "May", "June"];
            document.getElementById('modal-date').innerText = `${monthNames[today.getMonth()]} ${day}${getOrdinal(day)}`;
            
            const messages = {
                1: "A month of surprises starts today! I can't wait to celebrate you. 💖",
                10: "Ten days of countdown! You're the best thing that ever happened to me. 🌟",
                25: "Tomorrow is the big day! Get some rest, my queen. 💤"
            };
            
            document.getElementById('modal-body').innerText = messages[day] || "Every day is special because I have you. I love you more than words can say! ❤️";
            fireConfetti();
            document.getElementById('gift-modal').style.display = 'flex';
        }

        function closeModal() {
            document.getElementById('gift-modal').style.display = 'none';
            isOpened = false;
            clicksDone = 0;
        }

        function fireConfetti() {
            confetti({ particleCount: 100, spread: 60, origin: { y: 0.7 } });
        }

        function getOrdinal(n) {
            let s = ["th", "st", "nd", "rd"], v = n % 100;
            return s[(v - 20) % 10] || s[v] || s[0];
        }

        window.onload = init;
        // Fix for mobile orientation changes
        window.addEventListener('resize', resetGiftPosition);
    </script>
</body>
</html>
